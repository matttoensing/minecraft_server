version: '3.8'

services:
  minecraft:
    image: itzg/minecraft-server:latest # Uses the latest stable image
    container_name: minecraft_server
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      VERSION: "LATEST" # Automatically checks and downloads the newest jar
      TYPE: "VANILLA"
      MEMORY: "3G"
    volumes:
      - ./minecraft-data:/data
    restart: unless-stopped
    tty: true
    stdin_open: true
