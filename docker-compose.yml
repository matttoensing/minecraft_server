services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft_server
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      VERSION: "LATEST"    # Tells Docker to dynamically look up the newest snapshot
      TYPE: "SNAPSHOT"     # The image helper accepts SNAPSHOT when VERSION is LATEST or SNAPSHOT
      MEMORY: "3G"
    volumes:
      - ./minecraft-data:/data
    restart: unless-stopped