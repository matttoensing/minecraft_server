name: 🟢 Start Minecraft Server
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# The warning bypass is re-enabled here so the build stays green until September 2026
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: arn:aws:iam::513249876311:role/GithubActionsWorkflowRole
          aws-region: us-east-2

      - name: Boot EC2 Instance
        run: |
          aws ec2 start-instances --instance-ids ${{ secrets.AWS_EC2_INSTANCE_ID }}
          aws ec2 wait instance-running --instance-ids ${{ secrets.AWS_EC2_INSTANCE_ID }}

      - name: Deploy Latest Minecraft Image via SSH
        # Reverted to v1.0.3 to bypass the "no configuration file provided" runner bug
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            docker compose pull itzg/minecraft-server:latest
            docker compose up -d
