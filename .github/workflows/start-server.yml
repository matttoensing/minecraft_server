name: 🟢 Start Minecraft Server

on:
  workflow_dispatch: # Allows manual button click in GitHub web UI

permissions:
  id-token: write   # Required to fetch temporary AWS credentials
  contents: read    # Required to check out repository code

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Change this to your exact AWS Account Number and Role Name
          role-to-assume: arn:aws:iam::513249876311:role/GithubActionsWorkflowRole
          aws-region: us-east-1

      - name: Boot EC2 Instance
        run: |
          aws ec2 start-instances --instance-ids ${{ secrets.AWS_EC2_INSTANCE_ID }}
          aws ec2 wait instance-running --instance-ids ${{ secrets.AWS_EC2_INSTANCE_ID }}

      - name: Deploy Latest Minecraft Image via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            cd ~/minecraft-server
            docker-compose pull
            docker-compose up -d
