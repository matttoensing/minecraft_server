name: 🟢 Start Minecraft Server
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials via OIDC
        # Upgraded from @v4 to @v4.1.0+ which supports Node 24 natively
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: arn:aws:iam::513249876311:role/GithubActionsWorkflowRole
          aws-region: us-east-2

      - name: Boot EC2 Instance
        run: |
          aws ec2 start-instances --instance-ids ${{ secrets.AWS_EC2_INSTANCE_ID }}
          aws ec2 wait instance-running --instance-ids ${{ secrets.AWS_EC2_INSTANCE_ID }}

      - name: Deploy Latest Minecraft Image via SSH
        # Upgraded from @v1.0.3 to @v1.2.0+ to fully support modern Node runners
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            # Switched to modern 'docker compose' to avoid 'unhandled non-multipart' bugs
            docker compose pull itzg/minecraft-server:latest
            docker compose up -d
